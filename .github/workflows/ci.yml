name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aureus
          POSTGRES_PASSWORD: aureus
          POSTGRES_DB: aureus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aureus"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://aureus:aureus@localhost:5432/aureus?schema=public"
      JWT_ACCESS_SECRET: "ci-only-secret-do-not-use-in-production-min-32-chars"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.32.1"
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install

      - name: Prisma generate
        run: npx prisma generate

      - name: Type check
        run: pnpm run check-types

      - name: Lint
        run: pnpm run lint

      - name: Prisma migrate deploy
        run: npx prisma migrate deploy

      - name: Test (API unit, integration, and e2e tests)
        run: pnpm --filter @aureus-v1/api run test --coverage

      - name: Build
        run: pnpm run build

  # Docker Build Verification (PD-002). Both Dockerfiles were, until now,
  # "structurally sound but never build-verified against a live daemon"
  # (see docs/operations/production-runbook.md §3) — no daemon exists in
  # the sandbox these images were authored in. GitHub Actions' ubuntu-latest
  # runners DO have one, so this job is real, permanent build verification,
  # not a one-off manual check: it builds both production images and boots
  # the API image against a real Postgres, confirming /health/live and
  # /health/ready actually respond before anything is trusted for a deploy.
  docker:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: ci

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aureus
          POSTGRES_PASSWORD: aureus
          POSTGRES_DB: aureus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aureus"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t aureus-api:ci .

      - name: Build web image
        run: docker build -f apps/web/Dockerfile -t aureus-web:ci --build-arg NEXT_PUBLIC_API_BASE_URL=http://localhost:3000 .

      - name: Run migrations against the built API image
        run: |
          docker run --rm --network host \
            -e DATABASE_URL="postgresql://aureus:aureus@localhost:5432/aureus?schema=public" \
            aureus-api:ci npx prisma migrate deploy

      - name: Boot the API image and verify liveness + readiness
        run: |
          # The image bakes in NODE_ENV=production, so the boot-time Joi
          # validation requires an explicit CORS_ORIGIN and SMTP_HOST here
          # too (PD-001) — dummy-but-well-formed values are fine, this
          # smoke test only needs the container to boot and serve /health,
          # not to actually send email.
          docker run -d --network host --name api-smoke \
            -e DATABASE_URL="postgresql://aureus:aureus@localhost:5432/aureus?schema=public" \
            -e JWT_ACCESS_SECRET="ci-only-secret-do-not-use-in-production-min-32-chars" \
            -e CORS_ORIGIN="http://localhost:3001" \
            -e SMTP_HOST="smtp.example.com" \
            aureus-api:ci

          echo "Waiting for /health/live..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health/live > /dev/null; then
              echo "live OK"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Container never became live"
              docker logs api-smoke
              exit 1
            fi
            sleep 1
          done

          echo "Checking /health/ready..."
          if ! curl -sf http://localhost:3000/health/ready > /dev/null; then
            echo "Readiness check failed"
            docker logs api-smoke
            exit 1
          fi
          echo "ready OK"

      - name: Container logs (always, for diagnosis)
        if: always()
        run: docker logs api-smoke || true

      - name: Clean up
        if: always()
        run: docker rm -f api-smoke || true
